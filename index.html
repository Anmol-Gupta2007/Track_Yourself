<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Yourself - Fitness Tracker</title>
    <style>
        /* CSS STYLES */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212;
            color: white;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #1DB954, #1ed760);
            border-radius: 15px;
        }

        header h1 {
            font-size: 28px;
            font-weight: bold;
        }

        header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .timer-heart-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .timer-box {
            background-color: #1E1E1E;
            padding: 20px;
            border-radius: 12px;
            flex: 1;
            margin-right: 10px;
        }

        .timer-box label {
            color: #888;
            font-size: 12px;
            display: block;
            margin-bottom: 5px;
        }

        .timer-box .time {
            font-size: 28px;
            font-weight: bold;
        }

        .heart-box {
            background-color: #1E1E1E;
            padding: 15px 20px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .heart-box .heart-icon {
            color: #ff4757;
            font-size: 28px;
            animation: heartbeat 1s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .heart-box .bpm {
            color: #ff4757;
            font-size: 20px;
            font-weight: bold;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .stat-card {
            background-color: #1E1E1E;
            padding: 20px;
            border-radius: 12px;
        }

        .stat-card .icon {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .stat-card .label {
            color: #888;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .stat-card .value {
            font-size: 18px;
            font-weight: bold;
            word-break: break-word;
        }

        .icon-steps { color: #3742fa; }
        .icon-calories { color: #ffa502; }
        .icon-distance { color: #2ed573; }
        .icon-location { color: #a55eea; }

        .chart-section {
            background-color: #1E1E1E;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
        }

        .chart-section h2 {
            font-size: 18px;
            margin-bottom: 15px;
        }

        .chart-container {
            height: 150px;
            display: flex;
            align-items: flex-end;
            justify-content: space-around;
            padding-top: 20px;
        }

        .bar {
            width: 40px;
            background: linear-gradient(to top, #1DB954, #1ed760);
            border-radius: 5px 5px 0 0;
            transition: height 0.5s ease;
            position: relative;
        }

        .bar-label {
            position: absolute;
            bottom: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #888;
            white-space: nowrap;
        }

        .bar-value {
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
        }

        .records-section {
            background-color: #1E1E1E;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .record-info h3 {
            font-size: 14px;
            color: #888;
            margin-bottom: 5px;
        }

        .record-info p {
            font-size: 20px;
            font-weight: bold;
            color: #ffa502;
        }

        .btn-start {
            background-color: #1DB954;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-start:hover {
            background-color: #1ed760;
            transform: scale(1.05);
        }

        .btn-start.stop {
            background-color: #ff4757;
        }

        .btn-start.stop:hover {
            background-color: #ff6b81;
        }

        .permission-btn {
            background-color: #3742fa;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            width: 100%;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Track Yourself</h1>
            <p>Fitness Tracker App</p>
        </header>

        <button id="permBtn" class="permission-btn" onclick="requestPermissions()">
            📍 Enable Location & Start
        </button>

        <div id="mainApp" class="hidden">
            <div class="timer-heart-container">
                <div class="timer-box">
                    <label>Time Active</label>
                    <div class="time" id="timer">00:00:00</div>
                </div>
                <div class="heart-box">
                    <span class="heart-icon">❤️</span>
                    <span class="bpm" id="heartRate">0 BPM</span>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="icon icon-steps">👟</div>
                    <div class="label">Steps</div>
                    <div class="value" id="steps">0</div>
                </div>
                <div class="stat-card">
                    <div class="icon icon-calories">🔥</div>
                    <div class="label">Calories</div>
                    <div class="value" id="calories">0 kcal</div>
                </div>
                <div class="stat-card">
                    <div class="icon icon-distance">📍</div>
                    <div class="label">Distance</div>
                    <div class="value" id="distance">0.00 km</div>
                </div>
                <div class="stat-card">
                    <div class="icon icon-location">🗺️</div>
                    <div class="label">Location</div>
                    <div class="value" id="location">Locating...</div>
                </div>
            </div>

            <div class="chart-section">
                <h2>📊 Statistics</h2>
                <div class="chart-container">
                    <div class="bar" id="barSteps" style="height: 0%;">
                        <span class="bar-value">0</span>
                        <span class="bar-label">Steps</span>
                    </div>
                    <div class="bar" id="barCalories" style="height: 0%;">
                        <span class="bar-value">0</span>
                        <span class="bar-label">Cal</span>
                    </div>
                    <div class="bar" id="barDistance" style="height: 0%;">
                        <span class="bar-value">0</span>
                        <span class="bar-label">Dist</span>
                    </div>
                </div>
            </div>

            <div class="records-section">
                <div class="record-info">
                    <h3>🏆 Highest Record</h3>
                    <p id="highestRecord">0 Steps</p>
                </div>
                <button class="btn-start" id="startBtn" onclick="toggleTracking()">
                    ▶ Start Workout
                </button>
            </div>
        </div>
    </div>

    <script>
        // JAVASCRIPT LOGIC

        // Variables
        let steps = 0;
        let highestRecord = 0;
        let distanceKm = 0;
        let calories = 0;
        let heartRate = 0;
        let isTracking = false;
        let timerInterval = null;
        let heartRateInterval = null;
        let seconds = 0;
        
        let lastPosition = null;
        let watchId = null;

        // Request Location Permission
        function requestPermissions() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        document.getElementById('permBtn').classList.add('hidden');
                        document.getElementById('mainApp').classList.remove('hidden');
                        startLocationTracking();
                    },
                    (error) => {
                        alert("Please allow location access to use this app!");
                    }
                );
            } else {
                alert("Geolocation is not supported by this browser!");
            }
        }

        // Start GPS Location Tracking
        function startLocationTracking() {
            const options = {
                enableHighAccuracy: true,
                timeout: 5000,
                maximumAge: 0
            };

            watchId = navigator.geolocation.watchPosition(
                (position) => {
                    const lat = position.coords.latitude.toFixed(4);
                    const lng = position.coords.longitude.toFixed(4);
                    document.getElementById('location').textContent = `${lat}, ${lng}`;

                    // Calculate distance
                    if (lastPosition) {
                        const R = 6371; // Radius of the earth in km
                        const dLat = deg2rad(position.coords.latitude - lastPosition.lat);
                        const dLon = deg2rad(position.coords.longitude - lastPosition.lng);
                        const a = 
                            Math.sin(dLat/2) * Math.sin(dLat/2) +
                            Math.cos(deg2rad(lastPosition.lat)) * Math.cos(deg2rad(position.coords.latitude)) * 
                            Math.sin(dLon/2) * Math.sin(dLon/2);
                        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                        const d = R * c;
                        distanceKm += d;
                        
                        updateStats();
                    }

                    lastPosition = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude
                    };
                },
                (error) => {
                    console.log("Location error:", error);
                },
                options
            );
        }

        function deg2rad(deg) {
            return deg * (Math.PI/180);
        }

        // Toggle Start/Stop Workout
        function toggleTracking() {
            const btn = document.getElementById('startBtn');
            
            if (isTracking) {
                // Stop
                isTracking = false;
                clearInterval(timerInterval);
                clearInterval(heartRateInterval);
                btn.innerHTML = "▶ Start Workout";
                btn.classList.remove('stop');
            } else {
                // Start
                isTracking = true;
                startTimer();
                startHeartRateSimulation();
                btn.innerHTML = "⏹ Stop Workout";
                btn.classList.add('stop');
            }
        }

        // Timer Function
        function startTimer() {
            timerInterval = setInterval(() => {
                seconds++;
                const hrs = Math.floor(seconds / 3600);
                const mins = Math.floor((seconds % 3600) / 60);
                const secs = seconds % 60;
                document.getElementById('timer').textContent = 
                    `${pad(hrs)}:${pad(mins)}:${pad(secs)}`;
            }, 1000);
        }

        function pad(num) {
            return num.toString().padStart(2, '0');
        }

        // Heart Rate Simulation (Browser can't read real heart rate)
        function startHeartRateSimulation() {
            heartRateInterval = setInterval(() => {
                if (!isTracking) return;
                // Random heart rate between 65-140
                heartRate = Math.floor(Math.random() * 76) + 65;
                document.getElementById('heartRate').textContent = `${heartRate} BPM`;
                
                // Simulate steps when tracking
                steps += Math.floor(Math.random() * 5) + 1;
                
                // Calculate calories (approx 0.04 cal per step)
                calories = Math.round(steps * 0.04);
                
                // Update highest record
                if (steps > highestRecord) {
                    highestRecord = steps;
                    document.getElementById('highestRecord').textContent = `${highestRecord} Steps`;
                }
                
                updateStats();
            }, 2000);
        }

        // Update All Statistics
        function updateStats() {
            document.getElementById('steps').textContent = steps;
            document.getElementById('calories').textContent = `${calories} kcal`;
            document.getElementById('distance').textContent = `${distanceKm.toFixed(2)} km`;
            
            // Update Chart Bars (scaled to max 100)
            const stepsPercent = Math.min(steps, 100);
            const caloriesPercent = Math.min(calories, 100);
            const distancePercent = Math.min(distanceKm * 10, 100);
            
            document.getElementById('barSteps').style.height = `${stepsPercent}%`;
            document.getElementById('barSteps').querySelector('.bar-value').textContent = steps;
            
            document.getElementById('barCalories').style.height = `${caloriesPercent}%`;
            document.getElementById('barCalories').querySelector('.bar-value').textContent = calories;
            
            document.getElementById('barDistance').style.height = `${distancePercent}%`;
            document.getElementById('barDistance').querySelector('.bar-value').textContent = distanceKm.toFixed(1);
        }
    </script>
</body>
</html>
